version: "3.9"

services:
  # ── PostgreSQL 15 ──
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: seabay
      POSTGRES_USER: seabay
      POSTGRES_PASSWORD: seabay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./specs/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seabay"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SEABAY_DATABASE_URL: postgresql+asyncpg://seabay:seabay@postgres:5432/seabay
      SEABAY_REDIS_URL: redis://redis:6379/0
      SEABAY_DEBUG: "true"
      SEABAY_REGION: intl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-api
  labels:
    app: {{ .Chart.Name }}
    component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      component: api
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: SEABAY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secrets
                  key: database-url
            - name: SEABAY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secrets
                  key: redis-url
            - name: SEABAY_REGION
              value: {{ .Values.env.SEABAY_REGION | quote }}
            - name: SEABAY_DEBUG
              value: {{ .Values.env.SEABAY_DEBUG | quote }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

# www.seabay.ai → seabay.ai redirect (SEO canonical)
# Insert this block BEFORE the main server block in /etc/nginx/sites-enabled/seabay
server {
    listen 80;
    listen 443 ssl;
    server_name www.seabay.ai;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    return 301 https://seabay.ai$request_uri;
}

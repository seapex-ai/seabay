# Seabay Prometheus monitoring configuration
# Deploy to /etc/prometheus/prometheus.yml or mount via Docker

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "seabay-api"
    metrics_path: "/v1/health"
    static_configs:
      - targets: ["api:8000"]
    scrape_interval: 30s

  - job_name: "seabay-mcp-edge"
    metrics_path: "/health"
    static_configs:
      - targets: ["mcp-edge:8100"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 60s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 60s

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 60s
